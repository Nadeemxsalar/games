<svg width="100%" height="100%" viewBox="30 60 140 80" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="40" y="70" rx="30" ry="30" width="120" height="60"
        fill="url(#grad1)" filter="url(#glow)">
    
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>

  <circle cx="70" cy="100" r="8" fill="#fff">
    <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="130" cy="90" r="5" fill="#ff4d4d">
    <animate attributeName="cy" values="90;85;90" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="100" r="5" fill="#4dff88">
    <animate attributeName="cy" values="100;105;100" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="110" r="5" fill="#4da6ff">
    <animate attributeName="cy" values="110;115;110" dur="1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="100" r="10" fill="#222">
    <animateTransform attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="4s"
      repeatCount="indefinite"/>
  </circle>

</svg>
